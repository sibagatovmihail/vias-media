<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Vias Media">
  <style>
    .v-dark{display:none}
    @media (prefers-color-scheme:dark){.v-light{display:none}.v-dark{display:inline}}
  </style>
  <image class="v-light" width="128" height="128" href="data:image/png;base64,"/>
  <image class="v-dark" width="128" height="128" href="data:image/png;base64,"/>
</svg>
