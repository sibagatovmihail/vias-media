<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Sign in · Vias Media</title>
  <style>
    :root {
      --bg: #FAFAF8;
      --card: #FFFFFF;
      --accent: #E8593A;
      --accent-hover: #D24828;
      --btn-on-accent: #FFFFFF;
      --text: #1C1917;
      --text-muted: rgba(28, 25, 23, 0.58);
      --border: rgba(28, 25, 23, 0.22);
      --input-bg: rgba(28, 25, 23, 0.06);
      --error: #C0392B;
      --radius-md: 0.75rem;
      --radius-sm: 0.5rem;
      --space-xs: 0.5rem;
      --space-sm: 0.75rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --shadow: 0 1.25rem 3rem rgba(0, 0, 0, 0.10);
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      padding-inline: var(--space-lg);
    }

    .login-card {
      width: 100%;
      max-width: 24rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow);
      padding: var(--space-xl);
    }

    .login-card__header { margin-bottom: var(--space-lg); }

    .login-card__eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: var(--space-xs);
    }

    .login-card__title {
      font-size: 1.5rem;
      line-height: 1.2;
      font-weight: 700;
      margin-bottom: var(--space-xs);
    }

    .login-card__subtitle {
      font-size: 0.9375rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .login-form { display: flex; flex-direction: column; gap: var(--space-md); }

    .field { display: flex; flex-direction: column; gap: var(--space-xs); }

    .field__label {
      font-size: 0.875rem;
      font-weight: 600;
    }

    .field__input {
      width: 100%;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem 0.875rem;
      transition: border-color 0.2s ease;
    }

    .field__input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-error {
      display: none;
      font-size: 0.875rem;
      color: var(--error);
    }

    .form-error.is-visible { display: block; }

    .btn-submit {
      width: 100%;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--btn-on-accent);
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.8125rem 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-submit:hover { background: var(--accent-hover); }
    .btn-submit:disabled { opacity: 0.6; cursor: progress; }

    .login-card__footnote {
      margin-top: var(--space-lg);
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="login-card__header">
      <div class="login-card__eyebrow">Restricted area</div>
      <h1 class="login-card__title">Teacher sign in</h1>
      <p class="login-card__subtitle">Enter the access password to view this page.</p>
    </div>

    <form class="login-form" id="login-form" novalidate>
      <div class="field">
        <label class="field__label" for="password">Password</label>
        <input
          class="field__input"
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          autofocus
          required
        />
      </div>

      <div class="form-error" id="form-error" role="alert"></div>

      <div class="field">
        <button class="btn-submit" type="submit" id="submit-btn">Sign in</button>
      </div>
    </form>

    <div class="login-card__footnote">
      This page is protected on the server. The password is never stored in the browser.
    </div>
  </main>

  <script>
    // Where to send the user after a successful login. middleware.js passes the
    // page they were trying to reach as ?next=/some/path. We only allow local
    // paths (must start with a single "/") to prevent open-redirect abuse.
    function getSafeNext() {
      const raw = new URLSearchParams(location.search).get('next') || '';
      if (raw.startsWith('/') && !raw.startsWith('//')) return raw;
      return '/teacher.html';
    }

    const form = document.getElementById('login-form');
    const input = document.getElementById('password');
    const errorBox = document.getElementById('form-error');
    const submitBtn = document.getElementById('submit-btn');

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add('is-visible');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.classList.remove('is-visible');
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: input.value }),
        });

        if (res.ok) {
          window.location.href = getSafeNext();
          return;
        }

        const data = await res.json().catch(() => ({}));
        showError(data.error || 'Sign in failed. Please try again.');
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        submitBtn.disabled = false;
        input.select();
      }
    });
  </script>
</body>
</html>
